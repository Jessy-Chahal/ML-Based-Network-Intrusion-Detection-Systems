name: nids-adv
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=2.0         # Fixes the numpy._core error
  - scikit-learn>=1.5  # Upgraded to support NumPy 2.x
  - pandas>=2.2        # Upgraded for compatibility
  - xgboost>=2.0
  - matplotlib>=3.7
  - seaborn>=0.12
  - jupyter
  - pytest
  - pip
  - pip:
    - tensorflow>=2.17 # Upgraded because TF 2.13 crashes on NumPy 2.x